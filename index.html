<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Arch — Coming Soon</title>
    <meta name="description" content="Blue Arch — Coming Soon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

        :root{
            --blue-deep:#1a2744;
            --blue-mid:#2c4a7c;
            --blue-soft:#4a7ab5;
            --blue-light:#7eaed4;
            --blue-pale:#c5ddef;
            --cream:#f4efe8;
            --warm-white:#faf8f5;
            --gold-soft:#d4a96a;
        }

        html,body{height:100%;overflow:hidden}

        body{
            font-family:'Nunito',sans-serif;
            background:var(--blue-deep);
            color:var(--warm-white);
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
        }

        /* layered atmospheric background */
        body::before{
            content:'';
            position:fixed;
            inset:0;
            background:
                radial-gradient(ellipse 120% 80% at 50% 110%, rgba(74,122,181,.35) 0%, transparent 60%),
                radial-gradient(ellipse 90% 60% at 30% 20%, rgba(44,74,124,.3) 0%, transparent 50%),
                radial-gradient(ellipse 80% 50% at 75% 30%, rgba(126,174,212,.15) 0%, transparent 50%),
                linear-gradient(175deg, #0f1b30 0%, #1a2744 35%, #243758 65%, #1a2744 100%);
            z-index:0;
        }

        /* soft arch silhouette */
        body::after{
            content:'';
            position:fixed;
            bottom:-10%;
            left:50%;
            transform:translateX(-50%);
            width:min(600px, 85vw);
            height:min(600px, 85vw);
            border-radius:50% 50% 0 0;
            background:linear-gradient(
                to top,
                rgba(74,122,181,.06) 0%,
                rgba(126,174,212,.04) 40%,
                transparent 70%
            );
            border-top:1px solid rgba(126,174,212,.08);
            z-index:0;
            pointer-events:none;
        }

        .container{
            position:relative;
            z-index:1;
            text-align:center;
            padding:2rem;
            max-width:640px;
        }

        .logo{
            display:block;
            margin:0 auto 1.5rem;
            width:clamp(180px, 35vw, 280px);
            height:auto;
        }

        .subtitle{
            font-size:clamp(1rem, 2.8vw, 1.35rem);
            font-weight:300;
            letter-spacing:.18em;
            text-transform:uppercase;
            color:var(--blue-light);
            margin-bottom:3rem;
        }

        /* thin separator */
        .sep{
            display:block;
            width:40px;
            height:1px;
            margin:0 auto 3.5rem;
            background:var(--gold-soft);
            opacity:.5;
        }

        .coming{
            font-size:clamp(.85rem, 2vw, 1.05rem);
            font-weight:600;
            letter-spacing:.32em;
            text-transform:uppercase;
            color:var(--blue-pale);
            animation:softPulse 4s ease-in-out infinite;
        }

        @keyframes softPulse{
            0%,100%{opacity:.6}
            50%{opacity:1}
        }

        /* small noise-grain overlay for texture */
        .grain{
            position:fixed;
            inset:0;
            z-index:2;
            pointer-events:none;
            opacity:.035;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat:repeat;
            background-size:180px;
        }

        /* small footer text */
        .footer{
            position:fixed;
            bottom:1.8rem;
            left:0;right:0;
            text-align:center;
            z-index:1;
            font-size:.7rem;
            letter-spacing:.08em;
            color:rgba(197,221,239,.25);
        }
    </style>
</head>
